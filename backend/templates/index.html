<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceTrack HR · Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; color: white; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 3rem; }
        .cards { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
        .card { background: white; color: #333; width: 280px; padding: 2rem; border-radius: 20px; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .card i { font-size: 3rem; color: #667eea; margin-bottom: 1rem; }
        .card h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .card p { color: #666; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FaceTrack HR</h1>
        <div class="subtitle">Face Recognition Attendance System</div>
        <div class="cards">
            <div class="card" onclick="location.href='/admin-login'">
                <i class="fas fa-user-shield"></i>
                <h3>Admin Panel</h3>
                <p>Manage employees, view reports, and monitor attendance.</p>
            </div>
            <div class="card" onclick="location.href='/user-face-login'">
                <i class="fas fa-camera-retro"></i>
                <h3>User Panel</h3>
                <p>Login using face recognition and mark attendance.</p>
            </div>
        </div>
    </div>
</body>
</html>
