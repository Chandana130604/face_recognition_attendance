<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logout-icon { font-size: 4rem; margin-bottom: 1rem; }
        h2 { font-weight: 700; color: #333; margin-bottom: 0.5rem; }
        p { color: #888; margin-bottom: 2rem; }
        .btn-home {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            margin-bottom: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
            color: white;
        }
        .btn-login {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }
        .btn-login:hover {
            background: #667eea;
            color: white;
        }
        .countdown {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="logout-icon">👋</div>
        <h2>You've been logged out</h2>
        <p>Thank you for using Face Attendance. See you next time!</p>
        <a href="/" class="btn-home">🏠 Go to Home</a>
        <a href="/admin-login" class="btn-login">🔐 Login Again</a>
        <p class="countdown" id="countdown">Redirecting to home in <span id="timer">5</span>s...</p>
    </div>

    <script>
        let seconds = 5;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            timerEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
