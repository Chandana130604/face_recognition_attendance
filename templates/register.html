{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-4">Register Employee</h2>
    
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Employee ID</label>
        <input type="text" id="emp_id" class="w-full border rounded px-3 py-2">
    </div>
    
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Employee Name</label>
        <input type="text" id="name" class="w-full border rounded px-3 py-2">
    </div>
    
    <div class="mb-4">
        <video id="video" width="640" height="480" autoplay class="border rounded"></video>
        <canvas id="canvas" width="640" height="480" style="display: none;"></canvas>
    </div>
    
    <div class="flex gap-2">
        <button id="captureBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            Capture & Register
        </button>
        <button id="startCamera" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">
            Start Camera
        </button>
    </div>
    
    <div id="result" class="mt-4"></div>
</div>

<script>
    const socket = io();
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    
    document.getElementById('startCamera').addEventListener('click', async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    });
    
    document.getElementById('captureBtn').addEventListener('click', () => {
        const emp_id = document.getElementById('emp_id').value;
        const name = document.getElementById('name').value;
        
        if (!emp_id || !name) {
            alert('Please enter both ID and name');
            return;
        }
        
        // Capture frame from video
        context.drawImage(video, 0, 0, 640, 480);
        const frameData = canvas.toDataURL('image/jpeg');
        
        // Send to server
        socket.emit('frame', {
            mode: 'register',
            frame: frameData,
            emp_id: emp_id,
            name: name
        });
    });
    
    socket.on('registration_result', (result) => {
        document.getElementById('result').innerHTML = 
            `<div class="p-3 bg-green-100 text-green-700 rounded">${result.message}</div>`;
    });
</script>
{% endblock %}
